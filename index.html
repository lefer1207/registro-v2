<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>REGISTRO POLICIAL PRO V2.21</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css'>
    <script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .loading { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .bg-dark-pro { background: #0f172a; }
        .bg-header-pro { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .btn-pro { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-pro:active { transform: scale(0.95); }
    </style>
</head>
<body class='bg-slate-50 text-slate-900'>
    <div id='pin-screen' class='fixed inset-0 flex flex-col items-center justify-center p-6 text-center z-[200] bg-dark-pro'>
        <i class='fas fa-shield-halved text-8xl text-blue-500 mb-8'></i>
        <h1 class='text-4xl font-black mb-1 italic uppercase tracking-tighter text-white'>REGISTRO <span class='text-blue-500'>PRO</span></h1>
        <div class='bg-slate-800/50 p-8 rounded-[40px] w-full max-w-xs border border-slate-700/50 backdrop-blur-xl'>
            <input type='password' id='pin-input' placeholder='PIN' class='w-full p-5 rounded-2xl text-center text-3xl mb-6 bg-slate-900/50 text-white border border-slate-700 outline-none font-black'>
            <button onclick='entrar()' class='w-full bg-blue-600 py-5 rounded-2xl font-black text-xl text-white shadow-lg btn-pro'>INGRESAR</button>
        </div>
    </div>

    <div id='app' class='hidden min-h-screen pb-32'>
        <header class='bg-header-pro text-white p-6 sticky top-0 z-50 shadow-xl border-b border-white/5'>
            <div class='flex justify-between items-end mb-6'>
                <div>
                    <h1 class='font-black italic text-2xl uppercase tracking-tighter leading-none'>REGISTRO <span class='text-blue-500'>PRO</span></h1>
                    <div id='status-dot' class='w-2 h-2 rounded-full bg-green-500 mt-2'></div>
                </div>
                <div id='count' class='bg-blue-600/20 text-blue-400 border border-blue-500/30 px-4 py-2 rounded-2xl text-[10px] font-black italic uppercase'>SINCRONIZANDO...</div>
            </div>
            <div class='relative'>
                <i class='fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-500'></i>
                <input type='text' id='bus' oninput='filtrar()' placeholder='Buscar nombre, CI o matrícula...' class='w-full p-5 pl-14 rounded-2xl bg-white/10 text-white text-sm outline-none border border-white/10 focus:border-blue-500/50 transition-all font-medium'>
            </div>
        </header>

        <main class='p-5 space-y-6'>
            <div class='grid grid-cols-2 gap-4'>
                <button onclick='abrirForm(false)' class='bg-white p-6 rounded-[35px] card-shadow flex flex-col items-center justify-center btn-pro border border-slate-100'>
                    <i class='fas fa-user-plus text-2xl text-blue-600 mb-3'></i>
                    <span class='text-[11px] font-black uppercase text-slate-800'>Nueva Persona</span>
                </button>
                <button onclick='abrirForm(true)' class='bg-white p-6 rounded-[35px] card-shadow flex flex-col items-center justify-center btn-pro border border-slate-100'>
                    <i class='fas fa-car text-2xl text-slate-700 mb-3'></i>
                    <span class='text-[11px] font-black uppercase text-slate-800'>Nueva Matrícula</span>
                </button>
            </div>
            <div id='lista' class='space-y-3'></div>
        </main>

        <nav class='fixed bottom-0 inset-x-0 bg-white/80 backdrop-blur-xl border-t border-slate-200 p-5 flex justify-around items-center z-40'>
            <button onclick='cargarDB()' class='text-slate-400 flex flex-col items-center'><i class='fas fa-sync-alt text-xl'></i><span class='text-[8px] font-black uppercase mt-1'>Sync</span></button>
            <button onclick='window.scrollTo({top: 0, behavior: "smooth"})' class='bg-dark-pro text-white w-16 h-16 rounded-full -mt-12 flex items-center justify-center shadow-2xl border-8 border-slate-50 btn-pro'><i class='fas fa-magnifying-glass text-xl'></i></button>
            <button onclick='irA("view-list")' class='text-blue-600 flex flex-col items-center'><i class='fas fa-home text-xl'></i><span class='text-[8px] font-black uppercase mt-1'>Inicio</span></button>
        </nav>

        <div id='view-form' class='fixed inset-0 bg-slate-50 z-[150] hidden flex flex-col'>
            <header class='bg-dark-pro text-white p-6 flex items-center gap-4'>
                <button onclick='irA("view-list")' class='p-2'><i class='fas fa-arrow-left'></i></button>
                <h2 id='f-titulo' class='text-xl font-black uppercase italic'></h2>
            </header>
            <div class='flex-1 overflow-y-auto p-6 space-y-6 pb-20'>
                <input type='hidden' id='f-id'>
                <div class='flex flex-col items-center mb-4'>
                    <img id='f-img-prev' class='w-40 h-40 rounded-[40px] object-cover border-4 border-white shadow-2xl hidden'>
                    <div id='f-img-placeholder' class='w-40 h-40 rounded-[40px] bg-slate-200 flex items-center justify-center shadow-xl text-slate-400'><i class='fas fa-user text-5xl'></i></div>
                    <button onclick='document.getElementById("f-foto").click()' class='-mt-6 bg-blue-600 text-white p-4 rounded-2xl shadow-xl'><i class='fas fa-camera'></i></button>
                    <input type='file' id='f-foto' accept='image/*' onchange='previsualizar(this)' class='hidden'>
                    <input type='hidden' id='f-foto-base64'>
                </div>
                <div class='grid gap-4'>
                    <input id='f-nom' type='text' placeholder='Nombre Completo' class='w-full p-5 rounded-2xl bg-white border border-slate-200 outline-none font-bold uppercase'>
                    <input id='f-ci' type='text' placeholder='Cédula' class='w-full p-5 rounded-2xl bg-white border border-slate-200 outline-none font-bold'>
                    <input id='f-dom' type='text' placeholder='Domicilio' class='w-full p-5 rounded-2xl bg-white border border-slate-200 outline-none font-bold uppercase'>
                    <div class='grid grid-cols-2 gap-4'>
                        <input id='f-veh' type='text' placeholder='Vehículo' class='w-full p-5 rounded-2xl bg-white border border-slate-200 outline-none font-bold uppercase'>
                        <input id='f-mat' type='text' placeholder='Matrícula' class='w-full p-5 rounded-2xl bg-white border border-slate-200 outline-none font-bold uppercase'>
                    </div>
                    <textarea id='f-notas' rows='5' placeholder='Notas/Historial' class='w-full p-6 rounded-[30px] bg-red-50 border border-red-100 outline-none font-bold text-red-900'></textarea>
                </div>
            </div>
            <footer class='p-6 bg-white border-t border-slate-200'>
                <button id='btn-save' onclick='guardarRegistro()' class='w-full bg-blue-700 text-white py-5 rounded-3xl font-black uppercase'>GUARDAR REGISTRO</button>
            </footer>
        </div>

        <div id='modal' class='fixed inset-0 bg-dark-pro/95 z-[160] hidden flex items-center justify-center p-4' onclick='this.classList.add("hidden")'>
            <div class='bg-white w-full max-w-md rounded-[50px] p-8 relative mt-10' onclick='event.stopPropagation()'>
                <img id='m-foto' class='w-40 h-40 rounded-[45px] border-[10px] border-white shadow-2xl object-cover mx-auto -mt-24 hidden'>
                <div id='m-foto-empty' class='w-40 h-40 rounded-[45px] border-[10px] border-white shadow-2xl bg-slate-100 flex items-center justify-center text-slate-300 mx-auto -mt-24'><i class='fas fa-user text-6xl'></i></div>
                <div class='flex justify-between items-start my-6'>
                    <h2 id='m-nom' class='text-2xl font-black uppercase italic text-slate-900 border-b-4 border-blue-600 flex-1 mr-4'></h2>
                    <button id='btn-edit-modal' class='bg-slate-100 p-4 rounded-2xl'><i class='fas fa-edit'></i></button>
                </div>
                <div class='space-y-4 max-h-[40vh] overflow-y-auto pr-2'>
                    <div class='bg-slate-50 p-4 rounded-2xl'><p class='text-[9px] font-black text-slate-400 uppercase'>Identificación</p><p id='m-ci' class='text-blue-700 font-black text-2xl uppercase'></p></div>
                    <p id='m-dom' class='text-slate-800 font-bold text-sm uppercase'></p>
                    <p id='m-veh' class='text-slate-800 font-bold text-sm uppercase'></p>
                    <div id='m-notas' class='text-red-700 font-bold text-[13px] bg-red-50 p-6 rounded-[30px] border border-red-100 whitespace-pre-wrap'></div>
                </div>
                <button onclick='document.getElementById("modal").classList.add("hidden")' class='mt-8 w-full bg-dark-pro text-white py-5 rounded-3xl font-black uppercase'>CERRAR</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://rfpdfaddzbcvtzfeaycg.supabase.co';
        const k1 = 'sb_secret';
        const k2 = '_PJybgMPIrnzxu74loQ-xRg_N6F15oMw';
        const SB_KEY = k1 + k2;
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let db = [];

        function entrar() {
            if (document.getElementById('pin-input').value === '3268') {
                document.getElementById('pin-screen').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                cargarDB();
            } else { alert('PIN INCORRECTO'); }
        }

        async function cargarDB() {
            document.getElementById('status-dot').className = 'w-2 h-2 rounded-full bg-yellow-500 loading';
            try {
                const { data, error } = await supabaseClient.from('personas').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                db = data || [];
                document.getElementById('count').innerText = db.length + ' REGISTROS';
                dibujar(db);
                document.getElementById('status-dot').className = 'w-2 h-2 rounded-full bg-green-500';
            } catch(e) {
                document.getElementById('status-dot').className = 'w-2 h-2 rounded-full bg-red-500';
            }
        }

        function dibujar(datos) {
            const lista = document.getElementById('lista');
            if(!datos || datos.length === 0) {
                lista.innerHTML = "<div class='text-center p-10 opacity-30 font-black italic'>SIN DATOS</div>";
                return;
            }
            let html = '';
            datos.forEach(p => {
                const img = p.foto ? '<img src="'+p.foto+'" class="w-12 h-12 rounded-2xl object-cover shadow-sm">' : '<div class="w-12 h-12 rounded-2xl bg-blue-50 flex items-center justify-center text-blue-600 text-xs font-black">'+(p.nombre ? p.nombre[0] : '?')+'</div>';
                html += "<div onclick="verDetalles('"+p.id+"')" class='bg-white p-5 rounded-[30px] card-shadow flex justify-between items-center active:bg-slate-50 border border-slate-100'>" +
                        "<div class='flex items-center gap-4 overflow-hidden'>" + img +
                        "<div class='overflow-hidden'><h3 class='font-black uppercase text-slate-900 text-xs truncate leading-tight'>"+(p.nombre || 'S/N')+"</h3>" +
                        "<p class='text-[10px] text-slate-400 font-bold'>"+(p.ci || p.matricula || '---')+"</p></div></div>" +
                        "<i class='fas fa-chevron-right text-slate-200 text-xs ml-4'></i></div>";
            });
            lista.innerHTML = html;
        }

        function verDetalles(id) {
            const p = db.find(x => x.id == id);
            if(!p) return;
            const mf = document.getElementById('m-foto');
            const mfe = document.getElementById('m-foto-empty');
            if(p.foto) { mf.src = p.foto; mf.classList.remove('hidden'); mfe.classList.add('hidden'); } else { mf.classList.add('hidden'); mfe.classList.remove('hidden'); }
            document.getElementById('m-nom').innerText = p.nombre;
            document.getElementById('m-ci').innerText = p.ci || 'SIN ID';
            document.getElementById('m-dom').innerText = p.domicilio || 'SIN DOMICILIO';
            document.getElementById('m-veh').innerText = (p.vehiculo || '') + ' ' + (p.matricula || '');
            document.getElementById('m-notas').innerText = p.notas;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('btn-edit-modal').onclick = () => { document.getElementById('modal').classList.add('hidden'); editarRegistro(p); };
        }

        function editarRegistro(p) {
            abrirForm(p.nombre && p.nombre.startsWith('MATRÍCULA:'));
            document.getElementById('f-id').value = p.id;
            document.getElementById('f-nom').value = (p.nombre || '').replace('MATRÍCULA: ', '');
            document.getElementById('f-ci').value = p.ci || '';
            document.getElementById('f-dom').value = p.domicilio || '';
            document.getElementById('f-veh').value = p.vehiculo || '';
            document.getElementById('f-mat').value = p.matricula || '';
            document.getElementById('f-notas').value = p.notas || '';
            if(p.foto) {
                document.getElementById('f-img-prev').src = p.foto;
                document.getElementById('f-img-prev').classList.remove('hidden');
                document.getElementById('f-img-placeholder').classList.add('hidden');
                document.getElementById('f-foto-base64').value = p.foto;
            }
            irA('view-form');
        }

        function filtrar() {
            const t = document.getElementById('bus').value.toLowerCase().trim();
            if(!t) return dibujar(db);
            dibujar(db.filter(p => (p.nombre && p.nombre.toLowerCase().includes(t)) || (p.ci && String(p.ci).includes(t)) || (p.matricula && String(p.matricula).toLowerCase().includes(t))));
        }

        function irA(id) {
            if(id === 'view-list') document.getElementById('view-form').classList.add('hidden');
            else document.getElementById('view-form').classList.remove('hidden');
        }

        function abrirForm(m) {
            document.getElementById('f-id').value = '';
            document.getElementById('f-titulo').innerText = m ? 'NUEVA MATRÍCULA' : 'NUEVA PERSONA';
            document.querySelectorAll('#view-form input, #view-form textarea').forEach(i => i.value = '');
            document.getElementById('f-img-prev').classList.add('hidden');
            document.getElementById('f-img-placeholder').classList.remove('hidden');
            document.getElementById('f-foto-base64').value = '';
            irA('view-form');
        }

        function previsualizar(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxW = 600;
                        const scale = maxW / img.width;
                        canvas.width = maxW;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                        document.getElementById('f-img-prev').src = dataUrl;
                        document.getElementById('f-img-prev').classList.remove('hidden');
                        document.getElementById('f-img-placeholder').classList.add('hidden');
                        document.getElementById('f-foto-base64').value = dataUrl;
                    }
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function guardarRegistro() {
            const btn = document.getElementById('btn-save');
            const id = document.getElementById('f-id').value;
            btn.innerText = 'GUARDANDO...';
            btn.disabled = true;
            const registro = {
                nombre: (document.getElementById('f-nom').value || '').toUpperCase().trim(),
                ci: document.getElementById('f-ci').value.trim(),
                domicilio: document.getElementById('f-dom').value.toUpperCase().trim(),
                vehiculo: document.getElementById('f-veh').value.toUpperCase().trim(),
                matricula: document.getElementById('f-mat').value.toUpperCase().trim(),
                notas: document.getElementById('f-notas').value || 'S/N',
                foto: document.getElementById('f-foto-base64').value
            };
            let res = id ? await supabaseClient.from('personas').update(registro).eq('id', id) : await supabaseClient.from('personas').insert([registro]);
            if (!res.error) {
                irA('view-list');
                cargarDB();
            } else { alert('Error al guardar.'); }
            btn.innerText = 'GUARDAR REGISTRO';
            btn.disabled = false;
        }
    </script>
</body>
</html>
