<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>REGISTRO PRO V2.25</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0f172a; color: white; }
        #banner { background: #ef4444; color: white; padding: 10px; text-align: center; font-weight: bold; position: fixed; top: 0; width: 100%; z-index: 9999; }
        #pin-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        input { width: 100%; max-width: 250px; padding: 20px; font-size: 30px; text-align: center; border-radius: 10px; border: none; margin-bottom: 20px; color: #000; }
        button { width: 100%; max-width: 250px; padding: 20px; font-size: 20px; background: #2563eb; color: white; border: none; border-radius: 10px; font-weight: bold; }
        #app { display: none; padding: 20px; padding-top: 60px; }
    </style>
</head>
<body>
    <div id='banner'>VERSIÓN ACTUAL: 2.25 (ID:8359)</div>
    
    <div id='pin-screen'>
        <h1 style='font-style:italic;'>REGISTRO <span style='color:#3b82f6;'>PRO</span></h1>
        <p>Escribe el PIN abajo:</p>
        <input type='tel' id='p' placeholder='PIN' autofocus>
        <button onclick='e()'>ENTRAR AHORA</button>
    </div>

    <div id='app'>
        <h1 style='color:#3b82f6;'>CONECTADO EXITOSAMENTE</h1>
        <p id='st'>Cargando base de datos...</p>
        <div id='li'></div>
        <button onclick='location.reload()' style='background:gray; margin-top:20px;'>ACTUALIZAR</button>
    </div>

    <script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script>
    <script>
        function e() {
            var pin = document.getElementById('p').value;
            if(pin === '3268') {
                document.getElementById('pin-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                i();
            } else {
                alert('PIN INCORRECTO: ' + pin);
            }
        }

        var s;
        function i() {
            try {
                var k = 'sb_secret' + '_PJybgMPIrnzxu74loQ-xRg_N6F15oMw';
                s = supabase.createClient('https://rfpdfaddzbcvtzfeaycg.supabase.co', k);
                c();
            } catch(err) { document.getElementById('st').innerText = 'Error al conectar'; }
        }

        async function c() {
            const { data, error } = await s.from('personas').select('*').order('created_at', { ascending: false });
            if(error) { document.getElementById('st').innerText = 'Error en base de datos'; return; }
            document.getElementById('st').innerText = data.length + ' registros encontrados';
            let h = '';
            data.forEach(p => {
                h += '<div style="background:white; color:black; margin-bottom:10px; padding:15px; border-radius:10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">' +
                     '<b style="text-transform:uppercase;">' + (p.nombre || p.matricula || 'SIN NOMBRE') + '</b><br>' +
                     '<span style="color:#666;">' + (p.ci || 'Sin CI') + '</span></div>';
            });
            document.getElementById('li').innerHTML = h;
        }
    </script>
</body>
</html>
