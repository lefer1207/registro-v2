var D = [];
var fotoActual = "";
var editandoIdx = -1;
var ultimosIndices = [];

function cargarDatos(){
 var g = localStorage.getItem('rp_adicionales');
 var a = g ? JSON.parse(g) : [];
 D = BASE.concat(a);
 document.getElementById('ct').textContent = D.length + ' REGISTROS';
}

function guardarAdicionales(){
 var a = D.slice(BASE.length);
 localStorage.setItem('rp_adicionales', JSON.stringify(a));
 document.getElementById('ct').textContent = D.length + ' REGISTROS';
}

function go(){
 if(document.getElementById('pin').value==='3268'){
  document.getElementById('ls').style.display='none';
  document.getElementById('app').style.display='block';
  cargarDatos();
  rn(D);
 }else if(document.getElementById('pin').value.length>=4){
  alert('PIN incorrecto');
  document.getElementById('pin').value='';
 }
}

function rn(items){
 var l=document.getElementById('lt');
 if(!items.length){l.innerHTML='<p style="text-align:center;opacity:0.3;margin-top:50px">Sin resultados</p>';return;}
 var h='';
 for(var idx=0;idx<items.length;idx++){
  var p=items[idx];
  var idxReal = ultimosIndices.length ? ultimosIndices[idx] : idx;
  var f='<div class="foto-mini">'+(p[8]?'<img src="'+esc(p[8])+'">':'&#x1f464;')+'</div>';
  h+='<div class="card" onclick="abrir('+idxReal+')">'+f+'<div><div class="nm">'+esc(p[0])+(idxReal>=BASE.length?' <span class="badge">NUEVO</span>':'')+'</div><div class="sub">CI '+(esc(p[1])||'---')+'</div></div></div>';
 }
 l.innerHTML=h;
}

function ft(){
 var q=document.getElementById('bus').value.toLowerCase().trim();
 if(!q){rn(D);return;}
 var r=[];
 ultimosIndices = [];
 for(var i=0;i<D.length;i++){
  var p=D[i];
  var text = (p[0]+' '+p[1]+' '+p[2]+' '+p[3]+' '+p[4]+' '+p[5]+' '+(p[6]?p[6].join(' '):'')+' '+(p[7]?p[7].join(' '):'')).toLowerCase();
  if(text.includes(q)){r.push(p);ultimosIndices.push(i);}
 }
 rn(r);
}

function abrir(idx){
 var p=D[idx];
 editandoIdx=idx;
 var b=document.getElementById('fichaBody');
 var h='';
 if(p[8]){h+='<img class="foto-grande" src="'+esc(p[8])+'">';}else{h+='<div class="foto-grande-placeholder">&#x1f464; SIN FOTO</div>';}
 h+='<div style="margin-bottom:15px"><button onclick="camFicha()" style="background:#374151;color:#fff;border:none;border-radius:10px;padding:10px;width:100%;cursor:pointer;font-size:13px">&#x1f4f7; CAMBIAR FOTO</button></div>';
 h+='<div class="campo"><label>Nombre Completo</label><span>'+esc(p[0])+'</span></div>';
 h+='<div class="campo"><label>CI</label><span>'+(esc(p[1])||'---')+'</span></div>';
 h+='<div class="campo"><label>Fecha de Nacimiento</label><span>'+(esc(p[2])||'---')+'</span></div>';
 h+='<div class="campo"><label>Direccion</label><span>'+(esc(p[3])||'---')+'</span></div>';
 h+='<div class="campo"><label>Telefono</label><span>'+(esc(p[4])||'---')+'</span></div>';
 h+='<div class="campo"><label>Ocupacion</label><span>'+(esc(p[5])||'---')+'</span></div>';
 if(p[6]&&p[6].length){
  var vs='<div style="display:flex;flex-wrap:wrap;gap:5px">';
  for(var i=0;i<p[6].length;i++){vs+='<span class="vehiculo-item">'+esc(p[6][i])+'</span>';}
  vs+='</div>';
  h+='<div class="campo"><label>Vehiculos / Matriculas</label>'+vs+'</div>';
 }
 if(p[7]&&p[7].length){
  h+='<div class="campo"><label>Notas / Familiares</label><span>'+esc(p[7].join(' / '))+'</span></div>';
 }
 h+='<div class="btn-row" style="margin-top:20px">';
 h+='<button onclick="editFicha()" style="flex:1;padding:12px;border-radius:10px;border:none;font-weight:bold;font-size:14px;cursor:pointer;background:#374151;color:#fff">&#x270f; EDITAR</button>';
 h+='</div>';
 b.innerHTML=h;
 document.getElementById('ficha').style.display='block';
}

function cerrarFicha(){
 document.getElementById('ficha').style.display='none';
 editandoIdx=-1;
}

function camFicha(){
 var inp=document.createElement('input');
 inp.type='file';
 inp.accept='image/*';
 inp.capture='environment';
 inp.onchange=function(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){D[editandoIdx][8]=ev.target.result;guardarAdicionales();abrir(editandoIdx);rn(D);};
  r.readAsDataURL(f);
 };
 inp.click();
}

function eliminarPersona(){
 if(editandoIdx<0)return;
 if(editandoIdx<BASE.length){alert('No se puede eliminar un registro base');return;}
 if(!confirm('Eliminar a '+D[editandoIdx][0]+'?'))return;
 D.splice(editandoIdx,1);
 guardarAdicionales();
 cerrarFicha();
 rn(D);
}

function abrirModalPersona(p){
 document.getElementById('modalPersona').style.display='block';
 document.getElementById('fNombre').value=p?p[0]:'';
 document.getElementById('fCI').value=p?p[1]:'';
 document.getElementById('fFN').value=p?p[2]:'';
 document.getElementById('fDir').value=p?p[3]:'';
 document.getElementById('fTel').value=p?p[4]:'';
 document.getElementById('fOcu').value=p?p[5]:'';
 document.getElementById('fNotas').value='';
 fotoActual=p?p[8]||'':'';
 var pf=document.getElementById('previewFoto');
 if(fotoActual){pf.src=fotoActual;pf.style.display='block';}else{pf.style.display='none';}
}

function cerrarModalPersona(){
 document.getElementById('modalPersona').style.display='none';
 editandoIdx=-1;
}

function previsualizarFoto(e){
 var f=e.target.files[0];if(!f)return;
 var r=new FileReader();
 r.onload=function(ev){fotoActual=ev.target.result;var pf=document.getElementById('previewFoto');pf.src=fotoActual;pf.style.display='block';};
 r.readAsDataURL(f);
}

function guardarPersona(){
 var nom=document.getElementById('fNombre').value.trim();
 var ci=document.getElementById('fCI').value.trim();
 if(!nom&&!ci){alert('Ingrese al menos el nombre');return;}
 if(editandoIdx>=0&&editandoIdx<D.length){
  D[editandoIdx][0]=nom||D[editandoIdx][0];
  D[editandoIdx][1]=ci||D[editandoIdx][1];
  D[editandoIdx][2]=document.getElementById('fFN').value.trim()||D[editandoIdx][2];
  D[editandoIdx][3]=document.getElementById('fDir').value.trim()||D[editandoIdx][3];
  D[editandoIdx][4]=document.getElementById('fTel').value.trim()||D[editandoIdx][4];
  D[editandoIdx][5]=document.getElementById('fOcu').value.trim()||D[editandoIdx][5];
  if(fotoActual)D[editandoIdx][8]=fotoActual;
  var nt=document.getElementById('fNotas').value.trim();
  if(nt)D[editandoIdx][7]=D[editandoIdx][7].concat([nt]);
  guardarAdicionales();
  cerrarModalPersona();
  abrir(editandoIdx);
  rn(D);
 }else{
  D.push([nom||'SIN NOMBRE',ci,document.getElementById('fFN').value.trim(),document.getElementById('fDir').value.trim(),document.getElementById('fTel').value.trim(),document.getElementById('fOcu').value.trim(),[],document.getElementById('fNotas').value.trim()?[document.getElementById('fNotas').value.trim()]:[],fotoActual||""]);
  guardarAdicionales();
  cerrarModalPersona();
  rn(D);
 }
}

function editFicha(){if(editandoIdx<0)return;abrirModalPersona(D[editandoIdx]);}

function abrirModalMatricula(){
 var sel=document.getElementById('mPersona');
 sel.innerHTML='<option value="">-- SIN PERSONA (SOLO MATRICULA) --</option>';
 for(var i=0;i<D.length;i++){
  var o=document.createElement('option');
  o.value=i;o.textContent=D[i][0]+' - CI '+(D[i][1]||'---');
  sel.appendChild(o);
 }
 document.getElementById('mPatente').value='';
 document.getElementById('mVehiculo').value='';
 document.getElementById('modalMatricula').style.display='block';
}

function cerrarModalMatricula(){document.getElementById('modalMatricula').style.display='none';}

function guardarMatricula(){
 var idx=parseInt(document.getElementById('mPersona').value);
 var pat=document.getElementById('mPatente').value.trim();
 var veh=document.getElementById('mVehiculo').value.trim();
 if(!pat&&!veh){alert('Ingrese al menos la patente');return;}
 var item=veh?veh+' - '+pat:pat;
 if(!isNaN(idx)){
  if(!D[idx][6])D[idx][6]=[];
  D[idx][6].push(item);
 }else{
  D.push(['(MATRICULA) '+pat, pat, '', '', '', '', [item], [], ""]);
 }
 guardarAdicionales();
 cerrarModalMatricula();
 rn(D);
}

function esc(s){if(!s)return'';return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;');}
