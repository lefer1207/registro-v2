<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>REGISTRO PRO V2.43</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin: 0; }
        .bg-header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; padding: 20px; position: sticky; top: 0; z-index: 100; }
        .input-pro { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; color: #0f172a; width: 100%; font-weight: 600; outline: none; }
        .label-pro { font-size: 10px; font-weight: 900; color: #64748b; text-transform: uppercase; margin-bottom: 4px; display: block; margin-left: 4px; }
        #app { display: none; background: #f1f5f9; min-height: 100vh; color: #0f172a; }
        #pin-screen { position: fixed; inset: 0; background: #0f172a; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id='pin-screen'>
        <h1 class='text-3xl font-black italic mb-10 uppercase tracking-tighter'>REGISTRO <span class='text-blue-500'>PRO</span></h1>
        <input type='tel' id='pin-input' placeholder='PIN' class='w-full max-w-xs p-4 rounded-2xl text-center text-4xl mb-6 bg-black text-white border border-slate-700 outline-none font-black'>
        <button onclick='ingresar()' class='w-full max-w-xs bg-blue-600 py-4 rounded-2xl font-black text-xl shadow-lg'>INGRESAR</button>
        <p class='mt-10 text-[10px] opacity-30 font-black uppercase'>V2.43 - RESCATE</p>
    </div>
    <div id='app'>
        <header class='bg-header'>
            <div class='flex justify-between items-center mb-6'>
                <h1 class='font-black italic text-2xl uppercase tracking-tighter'>REGISTRO <span class='text-blue-500'>PRO</span></h1>
                <div class='flex space-x-2'>
                    <button onclick='mostrarMigrador()' class='bg-amber-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg'><i class='fas fa-sync'></i></button>
                    <button onclick='abrirForm()' class='bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg'><i class='fas fa-plus'></i></button>
                </div>
            </div>
            <input type='text' id='bus' oninput='filtrar()' placeholder='Buscar...' class='w-full p-4 rounded-2xl bg-white/10 text-white border border-white/10 font-bold'>
        </header>
        <main id='lista' class='p-5 space-y-3'></main>
        <div id='modal-migracion' class='fixed inset-0 bg-slate-900/90 z-[300] hidden flex items-center justify-center p-5'>
            <div class='bg-white p-8 rounded-[32px] w-full max-w-md text-slate-900 text-center'>
                <h2 class='font-black text-xl mb-2 uppercase italic'>RESCATE ACTIVO</h2>
                <p class='text-[10px] font-bold text-slate-400 mb-6 uppercase'>Recuperando tus 1948 registros...</p>
                <div id='migracion-status' class='py-10'>
                    <button onclick='iniciarRescate()' class='bg-blue-600 text-white px-10 py-4 rounded-2xl font-black uppercase w-full'>INICIAR RESCATE</button>
                </div>
                <button onclick='cerrarMigrador()' class='text-slate-300 font-black uppercase text-[10px]'>Cancelar</button>
            </div>
        </div>
        <div id='modal' class='fixed inset-0 bg-white z-[200] hidden overflow-y-auto text-slate-900 p-5'>
            <div class='flex justify-between items-center mb-6'>
                <button onclick='cerrarModal()' class='text-slate-400'><i class='fas fa-times text-xl'></i></button>
                <h2 class='font-black uppercase italic'>DETALLES</h2>
                <button onclick='guardar()' class='text-blue-600 font-black uppercase'>Guardar</button>
            </div>
            <div class='space-y-4'>
                <div><span class='label-pro'>Nombre</span><input id='f-nombre' class='input-pro'></div>
                <div><span class='label-pro'>Cédula</span><input id='f-ci' class='input-pro'></div>
                <div><span class='label-pro'>Notas</span><textarea id='f-notas' class='input-pro h-32'></textarea></div>
            </div>
        </div>
    </div>
    <script>
        let sb; let db = [];
        const K = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmcGRmYWRkemJjdnR6ZmVheWNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMTU1MzQsImV4cCI6MjA5OTA5MTUzNH0.yXoweYF5pl01EU5R2be6GtnHto27HxLOjEmF8G87jOE';
        const U = 'https://rfpdfaddzbcvtzfeaycg.supabase.co';
        const OLD_U = 'https://pdoeklmwquxggppvigrf.supabase.co';
        const OLD_K = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkb2VrbG13cXV4Z2dwcHZpZ3JmIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTY5MjMwMzU0MywiZXhwIjoyMDA3ODc5NTQzfQ.iX28B8vTf0N7yB-h-yI-oYl8X6_0-y-2y2Y';

        function ingresar() {
            if (document.getElementById('pin-input').value === '3268') {
                document.getElementById('pin-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                init();
            } else { alert('PIN INCORRECTO'); }
        }
        async function init() {
            sb = supabase.createClient(U, K);
            cargar();
        }
        async function cargar() {
            const { data, error } = await sb.from('personas').select('*').order('created_at', { ascending: false });
            if (!error) { db = data; dibujar(db); }
        }
        function dibujar(datos) {
            const l = document.getElementById('lista');
            let h = '';
            datos.forEach(p => {
                h += "<div class='bg-white p-4 rounded-3xl shadow-sm border border-slate-200 flex items-center space-x-4'>" +
                     "<div class='w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-300'><i class='fas fa-user'></i></div>" +
                     "<div class='flex-1'><div class='font-black uppercase text-xs text-slate-800'>" + (p.nombre || '---') + "</div>" +
                     "<div class='text-[9px] text-slate-400 font-bold'>" + (p.ci || '---') + "</div></div></div>";
            });
            l.innerHTML = h || '<div class="text-center p-20 opacity-20 font-black uppercase text-slate-400">Sin registros</div>';
        }
        function mostrarMigrador() { document.getElementById('modal-migracion').classList.remove('hidden'); }
        function cerrarMigrador() { document.getElementById('modal-migracion').classList.add('hidden'); }
        async function iniciarRescate() {
            const st = document.getElementById('migracion-status');
            st.innerHTML = '<div class="loader"></div><p class="mt-4 font-black uppercase text-[10px]">Conectando al servidor viejo...</p>';
            try {
                const res = await fetch(OLD_U + '/rest/v1/personas?select=*', { headers: { 'apikey': OLD_K, 'Authorization': 'Bearer ' + OLD_K } });
                const dataViejos = await res.json();
                if (!Array.isArray(dataViejos)) throw new Error();
                for (let i = 0; i < dataViejos.length; i += 50) {
                    const block = dataViejos.slice(i, i + 50).map(p => ({ nombre: p.nombre, ci: p.ci, alias: p.alias, notas: p.notas }));
                    await sb.from('personas').insert(block);
                    st.innerHTML = '<div class="loader"></div><p class="mt-4 font-black uppercase text-[10px]">Subiendo: ' + (i + block.length) + ' / ' + dataViejos.length + '</p>';
                }
                st.innerHTML = '<i class="fas fa-check-circle text-green-500 text-5xl mb-4"></i><p class="font-black uppercase text-xs">¡LISTO!</p>';
                setTimeout(() => { cerrarMigrador(); cargar(); }, 2000);
            } catch(e) { st.innerHTML = '<p class="text-red-500 font-black uppercase text-[10px]">Error: El servidor viejo está apagado.</p>'; }
        }
        function abrirForm() { document.getElementById('modal').classList.remove('hidden'); }
        function cerrarModal() { document.getElementById('modal').classList.add('hidden'); }
        async function guardar() {
            const p = { nombre: document.getElementById('f-nombre').value, ci: document.getElementById('f-ci').value, notas: document.getElementById('f-notas').value };
            await sb.from('personas').insert([p]);
            cerrarModal(); cargar();
        }
        function filtrar() {
            const t = document.getElementById('bus').value.toLowerCase().trim();
            dibujar(db.filter(p => (p.nombre && p.nombre.toLowerCase().includes(t)) || (p.ci && String(p.ci).includes(t))));
        }
    </script>
</body>
</html>
