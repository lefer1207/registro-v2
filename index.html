<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>REGISTRO POLICIAL V2.11</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css'>
</head>
<body class='bg-slate-900 text-white font-sans'>
    <div id='pin-screen' class='fixed inset-0 flex flex-col items-center justify-center p-6 text-center z-[200] bg-slate-900'>
        <i class='fas fa-shield-halved text-7xl text-blue-500 mb-6'></i>
        <h1 class='text-4xl font-black mb-2 italic uppercase tracking-tighter'>REGISTRO <span class='text-blue-500'>V2.11</span></h1>
        <div class='bg-slate-800 p-8 rounded-[40px] w-full max-w-xs shadow-2xl border border-slate-700'>
            <input type='password' id='pin-input' placeholder='PIN' class='w-full p-4 rounded-2xl text-center text-3xl mb-6 bg-slate-900 text-white border-none outline-none font-black'>
            <button onclick='entrar()' class='w-full bg-blue-600 py-4 rounded-2xl font-black text-xl active:scale-95 shadow-lg'>INGRESAR</button>
        </div>
    </div>

    <div id='app' class='hidden bg-slate-100 text-slate-900 min-h-screen'>
        <header class='bg-slate-900 text-white p-5 sticky top-0 z-50 shadow-2xl'>
            <div class='flex justify-between items-center mb-4'>
                <h1 class='font-black italic text-xl uppercase'>REGISTRO <span class='text-blue-500'>POLICIAL</span></h1>
                <div id='count' class='bg-blue-600 px-3 py-1 rounded-full text-[10px] font-black'>0</div>
            </div>
            <div class='relative'>
                <i class='fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400'></i>
                <input type='text' id='bus' oninput='filtrar()' placeholder='BUSCAR NOMBRE O CI...' class='w-full p-4 pl-12 rounded-2xl bg-white text-slate-900 text-sm outline-none shadow-inner font-bold border-none'>
            </div>
        </header>

        <main class='p-4 pb-32'>
            <div class='grid grid-cols-2 gap-4 mb-6'>
                <button onclick='abrirForm(false)' class='bg-blue-900 text-white p-6 rounded-3xl shadow-xl flex flex-col items-center justify-center active:scale-95 transition-all'>
                    <i class='fas fa-user-plus text-3xl mb-2'></i>
                    <span class='text-[10px] font-black uppercase tracking-tighter'>PERSONA</span>
                </button>
                <button onclick='abrirForm(true)' class='bg-slate-700 text-white p-6 rounded-3xl shadow-xl flex flex-col items-center justify-center active:scale-95 transition-all'>
                    <i class='fas fa-car text-3xl mb-2'></i>
                    <span class='text-[10px] font-black uppercase tracking-tighter'>MATRÍCULA</span>
                </button>
            </div>

            <div id='local-status' class='bg-amber-50 border-l-4 border-amber-500 text-amber-700 p-4 mb-4 rounded-r-xl text-[10px] font-bold flex justify-between items-center'>
                <span>MODO LOCAL (Teléfono)</span>
                <input type='file' id='file-input' accept='.csv,.xlsx' class='hidden' onchange='importarArchivo(this)'>
                <button onclick='document.getElementById("file-input").click()' class='bg-amber-600 text-white px-2 py-1 rounded-lg uppercase text-[8px]'>Cargar</button>
            </div>

            <div id='lista' class='grid gap-2'></div>
        </main>

        <!-- FORMULARIO AJUSTADO -->
        <div id='view-form' class='fixed inset-0 bg-white z-[150] hidden flex flex-col p-6 overflow-y-auto'>
            <div onclick='irA("view-list")' class='mb-6 flex items-center font-black text-sm uppercase text-slate-400'><i class='fas fa-arrow-left mr-3'></i> VOLVER</div>
            <h2 id='f-titulo' class='text-3xl font-black uppercase italic mb-8 border-b-8 border-slate-900 pb-2 text-slate-900'></h2>
            <div class='space-y-4 pb-10'>
                <div id='c-nom'><label class='text-[10px] font-black text-slate-400 uppercase ml-2'>Nombre Completo</label><input id='f-nom' type='text' class='w-full p-5 rounded-2xl bg-slate-100 outline-none font-bold text-slate-900'></div>
                <div id='c-ci'><label class='text-[10px] font-black text-slate-400 uppercase ml-2'>Cédula</label><input id='f-ci' type='text' class='w-full p-5 rounded-2xl bg-slate-100 outline-none font-bold text-slate-900'></div>
                <div id='c-dom'><label class='text-[10px] font-black text-slate-400 uppercase ml-2'>Domicilio</label><input id='f-dom' type='text' class='w-full p-5 rounded-2xl bg-slate-100 outline-none font-bold text-slate-900'></div>
                <div id='c-tel'><label class='text-[10px] font-black text-slate-400 uppercase ml-2'>Teléfono</label><input id='f-tel' type='text' class='w-full p-5 rounded-2xl bg-slate-100 outline-none font-bold text-slate-900'></div>
                
                <!-- CAMPOS VEHICULO SIEMPRE VISIBLES PARA MATRICULA -->
                <div id='c-veh'><label class='text-[10px] font-black text-slate-400 uppercase ml-2'>Vehículo (Marca/Modelo)</label><input id='f-veh' type='text' class='w-full p-5 rounded-2xl bg-slate-100 outline-none font-bold text-slate-900'></div>
                <div id='c-mat'><label class='text-[10px] font-black text-slate-400 uppercase ml-2'>Matrícula</label><input id='f-mat' type='text' class='w-full p-5 rounded-2xl bg-slate-100 outline-none font-bold text-slate-900'></div>
                
                <div><label class='text-[10px] font-black text-red-400 uppercase ml-2'>Antecedentes / Notas</label><textarea id='f-notas' rows='6' class='w-full p-6 rounded-3xl bg-red-50 border border-red-100 outline-none font-bold text-red-900'></textarea></div>
                
                <button onclick='guardarLocal()' class='w-full bg-blue-700 text-white py-6 rounded-3xl font-black uppercase shadow-2xl active:scale-95'>GUARDAR REGISTRO</button>
            </div>
        </div>

        <div id='modal' class='fixed inset-0 bg-black/95 z-[160] hidden flex items-center justify-center p-4' onclick='this.classList.add("hidden")'>
            <div class='bg-white w-full max-w-md rounded-[50px] p-10 shadow-2xl relative' onclick='event.stopPropagation()'>
                <h2 id='m-nom' class='text-3xl font-black uppercase italic text-slate-900 border-b-4 border-blue-600 pb-4 mb-8 leading-tight'></h2>
                <div class='space-y-6 max-h-[55vh] overflow-y-auto pr-2 text-slate-900'>
                    <div id='m-ci-c'><p class='text-[10px] font-black text-slate-400 uppercase'>Cédula</p><p id='m-ci' class='text-blue-700 font-black text-2xl'></p></div>
                    <div id='m-dom-c'><p class='text-[10px] font-black text-slate-400 uppercase'>Domicilio</p><p id='m-dom' class='text-slate-800 font-bold'></p></div>
                    <div id='m-veh-c'><p class='text-[10px] font-black text-slate-400 uppercase'>Vehículo / Matrícula</p><p id='m-veh' class='text-slate-800 font-bold'></p></div>
                    <div><p class='text-[10px] font-black text-red-500 uppercase italic'>Historial / Notas</p><div id='m-notas' class='text-red-700 font-bold text-sm bg-red-50 p-6 rounded-3xl border border-red-100 mt-2 whitespace-pre-wrap'></div></div>
                </div>
                <button onclick='document.getElementById("modal").classList.add("hidden")' class='mt-10 w-full bg-slate-900 text-white py-6 rounded-3xl font-black uppercase'>CERRAR</button>
            </div>
        </div>
    </div>

    <script src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'></script>
    <script>
        let db = [];
        let modoMat = false;

        function entrar() {
            if (document.getElementById('pin-input').value === '3268') {
                document.getElementById('pin-screen').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                cargarDB();
            } else { alert('PIN INCORRECTO'); }
        }

        function cargarDB() {
            const localData = localStorage.getItem('registro_offline_db');
            if(localData) {
                db = JSON.parse(localData);
                document.getElementById('count').innerText = db.length;
                dibujar(db);
            }
        }

        function importarArchivo(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                let raw = XLSX.utils.sheet_to_json(sheet);
                db = raw.map((p, idx) => ({
                    id: Date.now() + idx,
                    nombre: p.nombre || p.Nombre || p.NOMBRE || 'S/N',
                    ci: p.ci || p.CI || p.Cedula || '',
                    domicilio: p.domicilio || p.Direccion || '',
                    vehiculo: p.vehiculo || p.marca || '',
                    matricula: p.matricula || p.vehiculo1 || '',
                    notas: p.notas || p.antecedentes || ''
                }));
                localStorage.setItem('registro_offline_db', JSON.stringify(db));
                cargarDB();
                alert('DATOS CARGADOS');
            };
            reader.readAsArrayBuffer(file);
        }

        function irA(id) {
            if(id === 'view-list') document.getElementById('view-form').classList.add('hidden');
            else document.getElementById('view-form').classList.remove('hidden');
        }

        function abrirForm(m) {
            modoMat = m;
            document.getElementById('f-titulo').innerText = m ? 'NUEVA MATRÍCULA' : 'NUEVA PERSONA';
            
            // Ocultar campos de persona si es matrícula
            document.getElementById('c-nom').style.display = m ? 'none' : 'block';
            document.getElementById('c-ci').style.display = m ? 'none' : 'block';
            document.getElementById('c-dom').style.display = m ? 'none' : 'block';
            document.getElementById('c-tel').style.display = m ? 'none' : 'block';
            
            // Limpiar todo
            document.querySelectorAll('#view-form input, #view-form textarea').forEach(i => i.value = '');
            irA('view-form');
        }

        function guardarLocal() {
            const n = document.getElementById('f-nom').value;
            const v = document.getElementById('f-veh').value;
            const m = document.getElementById('f-mat').value;
            
            if(!modoMat && !n) return alert('Nombre obligatorio');
            if(modoMat && !m) return alert('Matrícula obligatoria');

            const nuevo = {
                id: Date.now(),
                nombre: modoMat ? 'MATRÍCULA: ' + m : n,
                ci: document.getElementById('f-ci').value,
                domicilio: document.getElementById('f-dom').value,
                telefono: document.getElementById('f-tel').value,
                vehiculo: v,
                matricula: m,
                notas: document.getElementById('f-notas').value
            };
            db.unshift(nuevo);
            localStorage.setItem('registro_offline_db', JSON.stringify(db));
            document.getElementById('count').innerText = db.length;
            dibujar(db);
            irA('view-list');
        }

        function dibujar(datos) {
            const lista = document.getElementById('lista');
            lista.innerHTML = datos.map(p => `
                <div onclick="verDetalles(${p.id})" class='bg-white p-5 rounded-3xl shadow-sm border-l-8 border-blue-900 flex justify-between items-center mb-1 active:bg-slate-50'>
                    <div>
                        <h3 class='font-black uppercase text-slate-800 text-[12px]'>${p.nombre}</h3>
                        <p class='text-[10px] text-slate-400 font-black'>${p.ci ? 'CI: '+p.ci : (p.matricula ? 'MAT: '+p.matricula : '---')}</p>
                    </div>
                    <i class='fas fa-chevron-right text-slate-200 text-xs'></i>
                </div>`).join('');
        }

        function verDetalles(id) {
            const p = db.find(x => x.id === id);
            if(!p) return;
            document.getElementById('m-nom').innerText = p.nombre;
            document.getElementById('m-ci').innerText = p.ci || '---';
            document.getElementById('m-dom').innerText = p.domicilio || '---';
            document.getElementById('m-veh').innerText = (p.vehiculo || '') + ' ' + (p.matricula || '');
            document.getElementById('m-notas').innerText = p.notas || 'S/N';
            document.getElementById('modal').classList.remove('hidden');
        }

        function filtrar() {
            const t = document.getElementById('bus').value.toLowerCase().trim();
            if(!t) return dibujar(db);
            dibujar(db.filter(p => 
                String(p.nombre).toLowerCase().includes(t) || 
                String(p.ci).includes(t) || 
                String(p.matricula).toLowerCase().includes(t)
            ));
        }
    </script>
</body>
</html>
