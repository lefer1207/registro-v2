<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>REGISTRO V2.8 OFFLINE</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css'>
</head>
<body class='bg-slate-900 text-white font-sans'>
    <div id='pin-screen' class='fixed inset-0 flex flex-col items-center justify-center p-6 text-center z-[200] bg-slate-900'>
        <h1 class='text-4xl font-black mb-6 italic uppercase'>Registro v2.8</h1>
        <div class='bg-slate-800 p-8 rounded-[40px] w-full max-w-xs shadow-2xl'>
            <input type='password' id='pin-input' placeholder='PIN' class='w-full p-4 rounded-2xl text-center text-3xl mb-6 bg-slate-900 text-white border-none outline-none font-black'>
            <button onclick='entrar()' class='w-full bg-blue-600 py-4 rounded-2xl font-black text-xl'>INGRESAR</button>
        </div>
    </div>

    <div id='app' class='hidden bg-slate-100 text-slate-900 min-h-screen'>
        <header class='bg-slate-900 text-white p-5 sticky top-0 z-50 shadow-2xl flex justify-between items-center'>
            <h1 class='font-black italic text-xl'>REGISTRO <span class='text-blue-500'>V2.8</span></h1>
            <div id='count' class='bg-blue-600 px-3 py-1 rounded-full text-[10px] font-black'>0</div>
        </header>

        <main class='p-4'>
            <!-- ALERTA DE CUOTA -->
            <div id='quota-alert' class='bg-amber-50 border-l-4 border-amber-500 text-amber-700 p-4 mb-4 rounded-r-xl text-[11px] font-bold'>
                <p>⚠️ SUPABASE BLOQUEADO POR CUOTA</p>
                <p class='mt-2 mb-3'>Podés cargar tu archivo Excel/CSV para seguir trabajando sin internet:</p>
                <input type='file' id='file-input' accept='.csv,.xlsx' class='hidden' onchange='importarArchivo(this)'>
                <button onclick='document.getElementById("file-input").click()' class='bg-amber-600 text-white px-4 py-2 rounded-xl w-full uppercase font-black'>Cargar Respaldo (Excel/CSV)</button>
            </div>

            <input type='text' id='bus' oninput='filtrar()' placeholder='BUSCAR EN LOCAL...' class='w-full p-4 rounded-2xl bg-white text-slate-900 text-sm outline-none shadow-md font-bold mb-4 border-none'>
            <div id='lista' class='grid gap-2 pb-24'></div>
        </main>
    </div>

    <script src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'></script>
    <script>
        let db = [];

        function entrar() {
            if (document.getElementById('pin-input').value === '3268') {
                document.getElementById('pin-screen').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                const localData = localStorage.getItem('registro_offline_db');
                if(localData) {
                    db = JSON.parse(localData);
                    document.getElementById('count').innerText = db.length;
                    dibujar(db);
                    document.getElementById('quota-alert').classList.add('hidden');
                }
            } else { alert('PIN INCORRECTO'); }
        }

        function importarArchivo(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                db = XLSX.utils.sheet_to_json(sheet);
                
                // Mapear campos si los nombres son diferentes
                db = db.map(p => ({
                    nombre: p.nombre || p.Nombre || p.NOMBRE || 'S/N',
                    ci: p.ci || p.CI || p.Cedula || p.documento || '',
                    vehiculo1: p.vehiculo1 || p.matricula || p.Matricula || ''
                }));

                localStorage.setItem('registro_offline_db', JSON.stringify(db));
                document.getElementById('count').innerText = db.length;
                dibujar(db);
                document.getElementById('quota-alert').classList.add('hidden');
                alert('¡DATOS CARGADOS! ' + db.length + ' registros listos.');
            };
            reader.readAsArrayBuffer(file);
        }

        function dibujar(datos) {
            const lista = document.getElementById('lista');
            lista.innerHTML = datos.map(p => `
                <div class='bg-white p-5 rounded-3xl shadow-sm border-l-8 border-blue-900 mb-1'>
                    <h3 class='font-black uppercase text-slate-800 text-[12px]'>${p.nombre}</h3>
                    <p class='text-[10px] text-slate-400 font-black'>${p.ci ? 'CI: '+p.ci : (p.vehiculo1 ? 'MAT: '+p.vehiculo1 : '---')}</p>
                </div>`).join('');
        }

        function filtrar() {
            const t = document.getElementById('bus').value.toLowerCase().trim();
            if(!t) return dibujar(db);
            dibujar(db.filter(p => p.nombre.toLowerCase().includes(t) || String(p.ci).includes(t)));
        }
    </script>
</body>
</html>
