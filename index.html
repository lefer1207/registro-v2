        function ingresar() {
            if (document.getElementById('pin-input').value === '3268') {
                document.getElementById('pin-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                sb = supabase.createClient(U, K);
                cargar();
            }
        }
        async function cargar() {
            const { data, error } = await sb.from('personas').select('*').order('nombre');
            if (!error) { db = data; dibujar(db); }
        }
        function dibujar(datos) {
            const l = document.getElementById('lista');
            l.innerHTML = datos.map(p => "<div class='bg-white p-5 rounded-[32px] shadow-sm border border-slate-200 flex items-center space-x-4 animate-in fade-in duration-500'><div class='w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-200'><i class='fas fa-user text-2xl'></i></div><div class='flex-1'><div class='font-black uppercase text-xs text-slate-800 tracking-tight'>" + p.nombre + "</div><div class='text-[10px] text-slate-400 font-bold uppercase'>CI " + (p.ci || '---') + "</div></div></div>").join('') || '<div class="text-center p-24 opacity-20 font-black uppercase tracking-widest text-slate-400">Vacío</div>';
        }
        async function importarDrive() {
            if (!confirm('¿Restaurar los ' + DRIVE_DATA.length + ' registros del respaldo completo?')) return;
            const btn = document.getElementById('btn-import');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            const batchSize = 30;
            let successCount = 0;
            for (let i = 0; i < DRIVE_DATA.length; i += batchSize) {
                const chunk = DRIVE_DATA.slice(i, i + batchSize).map(d => ({ nombre: d.n, ci: d.c }));
                const { error } = await sb.from('personas').insert(chunk);
                if (!error) successCount += chunk.length;
            }
            
            if (successCount > 0) {
                alert('¡Restauración exitosa! Se cargaron ' + successCount + ' registros.');
                cargar();
                btn.innerHTML = '<i class="fas fa-check"></i>';
            } else {
                alert('Error al insertar. ¿Creaste la tabla personas en el Supabase nuevo?');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-file-import"></i>';
            }
        }
        function filtrar() {
            const t = document.getElementById('bus').value.toLowerCase().trim();
            dibujar(db.filter(p => (p.nombre && p.nombre.toLowerCase().includes(t)) || (p.ci && String(p.ci).includes(t))));
        }
