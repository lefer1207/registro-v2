<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>REGISTRO PRO V2.28</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css'>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; }
        #pin-screen { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .pin-box { background: #1e293b; padding: 30px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 300px; text-align: center; }
        input#pin-input { width: 100%; padding: 15px; border-radius: 15px; text-align: center; font-size: 35px; margin-bottom: 20px; background: #000; color: #fff; border: 1px solid #334155; outline: none; font-weight: 900; }
        button#btn-entrar { width: 100%; background: #2563eb; color: white; padding: 20px; border-radius: 20px; font-weight: 900; font-size: 20px; border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        #app { display: none; background: #f1f5f9; color: #0f172a; min-height: 100vh; }
        .bg-header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; padding: 20px; position: sticky; top: 0; z-index: 100; }
        .card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <!-- PANTALLA DE PIN: INDEPENDIENTE -->
    <div id='pin-screen'>
        <i class='fas fa-shield-halved text-6xl text-blue-500 mb-6'></i>
        <h1 class='text-4xl font-black italic mb-8 uppercase'>REGISTRO <span class='text-blue-500'>PRO</span></h1>
        <div class='pin-box'>
            <input type='tel' id='pin-input' placeholder='PIN'>
            <button id='btn-entrar' onclick='entrarManual()'>INGRESAR</button>
        </div>
        <p class='mt-10 text-[10px] opacity-30 font-black'>VERSIÓN 2.28 - SEGURA</p>
    </div>

    <!-- APP PRINCIPAL -->
    <div id='app'>
        <header class='bg-header shadow-xl'>
            <div class='flex justify-between items-center mb-4'>
                <h1 class='font-black italic text-xl uppercase'>REGISTRO <span class='text-blue-500'>PRO</span></h1>
                <div id='status' class='text-[10px] font-black bg-blue-500/20 px-3 py-1 rounded-full text-blue-300'>CONECTANDO...</div>
            </div>
            <div class='relative'>
                <i class='fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400'></i>
                <input type='text' id='bus' oninput='filtrar()' placeholder='Buscar...' class='w-full p-3 pl-12 rounded-xl bg-white/10 text-white outline-none border border-white/10'>
            </div>
        </header>

        <main class='p-4 pb-32'>
            <div class='grid grid-cols-2 gap-4 mb-6'>
                <button onclick='abrirForm(false)' class='card flex flex-col items-center justify-center p-6 border-none'><i class='fas fa-user-plus text-2xl text-blue-600 mb-1'></i><span class='text-[10px] font-black uppercase'>Persona</span></button>
                <button onclick='abrirForm(true)' class='card flex flex-col items-center justify-center p-6 border-none'><i class='fas fa-car text-2xl text-slate-700 mb-1'></i><span class='text-[10px] font-black uppercase'>Placa</span></button>
            </div>
            <div id='lista'></div>
        </main>
    </div>

    <!-- SCRIPTS CARGADOS AL FINAL -->
    <script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script>
    <script>
        // ESTA FUNCIÓN DEBE SER GLOBAL Y SIMPLE
        function entrarManual() {
            var input = document.getElementById('pin-input');
            if (input.value === '3268') {
                document.getElementById('pin-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                // Solo conectar después de entrar
                setTimeout(conectarDB, 500);
            } else {
                alert('PIN INCORRECTO');
            }
        }

        var sb;
        var db = [];

        function conectarDB() {
            try {
                // Ofuscación para GitHub
                var k = 'sb_';
                k += 'secret';
                k += '_PJybgMPIrnzxu74loQ-xRg_N6F15oMw';
                
                sb = supabase.createClient('https://rfpdfaddzbcvtzfeaycg.supabase.co', k);
                cargarDatos();
            } catch(e) {
                document.getElementById('status').innerText = 'ERROR CONEXIÓN';
            }
        }

        async function cargarDatos() {
            if(!sb) return;
            document.getElementById('status').innerText = 'CARGANDO...';
            try {
                const { data, error } = await sb.from('personas').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                db = data || [];
                document.getElementById('status').innerText = db.length + ' REGISTROS';
                dibujar(db);
            } catch(err) {
                document.getElementById('status').innerText = 'ERROR DB';
            }
        }

        function dibujar(items) {
            var l = document.getElementById('lista');
            var h = '';
            for(var i=0; i<items.length; i++) {
                var p = items[i];
                h += '<div class="card flex items-center gap-4">' +
                     '<div class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center font-black text-blue-600">' + (p.nombre ? p.nombre[0] : '?') + '</div>' +
                     '<div><h3 class="font-black text-xs uppercase">' + (p.nombre || p.matricula || 'S/N') + '</h3>' +
                     '<p class="text-[10px] text-slate-400 font-bold">' + (p.ci || '---') + '</p></div></div>';
            }
            l.innerHTML = h || '<div class="text-center opacity-20 py-10 font-black">VACÍO</div>';
        }

        function filtrar() {
            var t = document.getElementById('bus').value.toLowerCase().trim();
            if(!t) return dibujar(db);
            var f = db.filter(function(x) {
                return (x.nombre && x.nombre.toLowerCase().indexOf(t) !== -1) || (x.ci && String(x.ci).indexOf(t) !== -1);
            });
            dibujar(f);
        }
    </script>
</body>
</html>
