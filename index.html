        function go() {
            if(document.getElementById('p').value === '3268') {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                dibujar(DB);
            } else if(document.getElementById('p').value.length >= 4) {
                alert('PIN INCORRECTO');
                document.getElementById('p').value = '';
            }
        }

        function dibujar(datos) {
            const l = document.getElementById('list');
            if(!datos || datos.length === 0) {
                l.innerHTML = '<div class="text-center p-20 opacity-20 font-black uppercase">Sin datos en el respaldo</div>';
                return;
            }
            l.innerHTML = datos.map(p => `
                <div class="bg-white p-5 rounded-[24px] shadow-sm flex items-center space-x-4">
                    <div class="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center text-slate-400"><i class="fas fa-user-shield text-xl"></i></div>
                    <div>
                        <div class="font-black uppercase text-sm text-slate-900">${p.nombre}</div>
                        <div class="text-[10px] text-blue-600 font-black tracking-widest uppercase">CI ${p.ci || '---'}</div>
                    </div>
                </div>
            `).join("");
        }

        function filtrar() {
            const q = document.getElementById('bus').value.toLowerCase().trim();
            const res = DB.filter(p => p.nombre.toLowerCase().includes(q) || p.ci.includes(q));
            dibujar(res);
        }

        document.getElementById('p').addEventListener('keypress', (e) => { if(e.key === 'Enter') go(); });
