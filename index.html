<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>REGISTRO PRO V2.44</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css'>
</head>
<body class='bg-slate-100 font-sans'>
    <div id='pin-screen' class='fixed inset-0 bg-slate-900 z-[1000] flex flex-col items-center justify-center p-6 text-center'>
        <h1 class='text-white text-3xl font-black italic mb-10 uppercase'>REGISTRO <span class='text-blue-500'>PRO</span></h1>
        <input type='tel' id='pin-input' placeholder='PIN' class='w-full max-w-xs p-4 rounded-2xl text-center text-4xl mb-6 bg-black text-white font-black outline-none border border-slate-700'>
        <button onclick='ingresar()' class='w-full max-w-xs bg-blue-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg'>INGRESAR</button>
        <p class='text-white/20 mt-10 text-[10px] font-black uppercase tracking-widest'>v2.44 - RECOVERY</p>
    </div>

    <div id='app' class='hidden pb-24'>
        <header class='bg-slate-900 text-white p-6 sticky top-0 z-50 shadow-2xl'>
            <div class='flex justify-between items-center mb-6'>
                <h1 class='font-black italic text-2xl tracking-tighter uppercase'>REGISTRO <span class='text-blue-500'>PRO</span></h1>
                <div class='flex space-x-2'>
                    <button id='btn-import' onclick='importarDrive()' class='bg-green-600 w-12 h-12 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform'><i class='fas fa-file-import'></i></button>
                    <button onclick='window.location.reload()' class='bg-slate-700 w-12 h-12 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform'><i class='fas fa-sync'></i></button>
                </div>
            </div>
            <input type='text' id='bus' oninput='filtrar()' placeholder='Buscar registros...' class='w-full p-4 rounded-2xl bg-white/10 text-white border border-white/10 font-bold outline-none focus:bg-white/20'>
        </header>
        <main id='lista' class='p-5 space-y-3'></main>
    </div>

    <script>
        let sb; let db = [];
        const K = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmcGRmYWRkemJjdnR6ZmVheWNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMTU1MzQsImV4cCI6MjA5OTA5MTUzNH0.yXoweYF5pl01EU5R2be6GtnHto27HxLOjEmF8G87jOE';
        const U = 'https://rfpdfaddzbcvtzfeaycg.supabase.co';
        const DRIVE_DATA = [{"n": "Maria Florencia Andrioli Araujo", "c": "55688912"}, {"n": "Donato Sebastian Silva Machado", "c": "51614256"}, {"n": "Alejandra Rosa Silva Fleitas", "c": "43248837"}, {"n": "Ruzbel Alexandro Ramirez", "c": "47529487"}, {"n": "Marianela Camiza Alvarez", "c": "34878728"}, {"n": "Martin Fabian Caceres Sappa", "c": "25295513"}, {"n": "Wilson Ney Peralta", "c": "38463442"}, {"n": "Luis Angel Lopez Santana", "c": "53262655"}, {"n": "Maria del Carmen de Leon Volppe", "c": "34756318"}, {"n": "Eduardo Joaquin Furtado Sala", "c": "51881237"}, {"n": "Cristian Marcelo Martinez Delgado", "c": "40000911"}, {"n": "Karen Musto Olivas", "c": "53223237"}];

        function ingresar() {
            if (document.getElementById('pin-input').value === '3268') {
                document.getElementById('pin-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                sb = supabase.createClient(U, K);
                cargar();
            }
        }
        async function cargar() {
            const { data, error } = await sb.from('personas').select('*').order('nombre');
            if (!error) { db = data; dibujar(db); }
        }
        function dibujar(datos) {
            const l = document.getElementById('lista');
            l.innerHTML = datos.map(p => "<div class='bg-white p-5 rounded-[32px] shadow-sm border border-slate-200 flex items-center space-x-4 animate-in fade-in duration-500'><div class='w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-200'><i class='fas fa-user text-2xl'></i></div><div class='flex-1'><div class='font-black uppercase text-xs text-slate-800 tracking-tight'>" + p.nombre + "</div><div class='text-[10px] text-slate-400 font-bold'>" + (p.ci || '---') + "</div></div></div>").join('') || '<div class="text-center p-24 opacity-20 font-black uppercase tracking-widest text-slate-400">Vacío</div>';
        }
        async function importarDrive() {
            if (!confirm('¿Restaurar registros desde el respaldo?')) return;
            const btn = document.getElementById('btn-import');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            const batch = DRIVE_DATA.map(d => ({ nombre: d.n, ci: d.c }));
            const { error } = await sb.from('personas').insert(batch);
            if (error) { alert('Error: No se puede escribir. ¿Ya creaste la tabla en Supabase?'); btn.disabled = false; btn.innerHTML = '<i class="fas fa-file-import"></i>'; }
            else { alert('¡Restauración exitosa!'); cargar(); btn.innerHTML = '<i class="fas fa-check"></i>'; }
        }
        function filtrar() {
            const t = document.getElementById('bus').value.toLowerCase().trim();
            dibujar(db.filter(p => (p.nombre && p.nombre.toLowerCase().includes(t)) || (p.ci && String(p.ci).includes(t))));
        }
    </script>
</body>
</html>
